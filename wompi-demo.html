<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Wompi Checkout</title>
  <!-- Carga el widget oficial de Wompi -->
  <script src="https://checkout.wompi.co/widget.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; }
    button { padding: 1rem 2rem; font-size: 1.1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Demo de Pago con Wompi</h1>
  <p>Monto: <strong>$10.000 COP</strong></p>
  <button id="btn-pagar">Pagar con Wompi</button>

  <script>
    document.getElementById('btn-pagar').addEventListener('click', () => {
      // Configura la sesión de pago
      const checkout = new WompiCheckout({
        currency: 'COP',
        amountInCents: 10000 * 100,             // $10.000 COP en centavos
        reference: 'demo_' + Date.now(),        // referencia única
        publicKey: 'pub_test_Q5kS4d6p3l1wE7tY0c5qBwG2jZ3xR1oP', // tu public key sandbox
        redirectUrl: `${location.origin}/confirmation.html`
      });

      // Abre el widget
      checkout.open();
    });
  </script>
</body>
</html>
