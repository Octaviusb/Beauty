<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | BeautyLine</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script src="admin.js" defer></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fffafc; }
    h1 { color: #d63384; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    td, th { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    button { padding: 4px 8px; margin: 2px; }
    input, select { width: 100%; padding: 4px; }
  </style>
</head>
<body>
  <h1>Panel Admin - BeautyLine</h1>
  <table id="productsTable">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Categoría</th>
        <th>Precio</th>
        <th>Descripción</th>
        <th>Imagen</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Agregar Nuevo Producto</h2>
  <form id="addForm">
    <input name="name" placeholder="Nombre" required />
    <input name="category" placeholder="Categoría" required />
    <input name="price" type="number" placeholder="Precio" required />
    <input name="description" placeholder="Descripción" />
    <input name="image" placeholder="URL Imagen" />
    <button type="submit">Agregar</button>
  </form>
</body>
</html>
