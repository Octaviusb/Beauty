<!DOCTYPE html>
<html>
<head>
  <title>Imagen Predeterminada</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8f9fa;
    }
    .placeholder {
      width: 300px;
      height: 300px;
      background-color: #e9ecef;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #6c757d;
      font-family: Arial, sans-serif;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <div class="icon">📷</div>
    <div>Imagen no disponible</div>
  </div>
</body>
</html>
