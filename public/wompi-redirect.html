<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo a Wompi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f8f9fa;
      text-align: center;
    }
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    p {
      color: #666;
      margin-bottom: 30px;
    }
    .btn {
      background-color: #00aef7;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
    }
    .btn:hover {
      background-color: #0095d9;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h1>Redirigiendo a Wompi</h1>
  <p>Serás redirigido automáticamente a la página de pago de Wompi en unos segundos...</p>
  <a href="https://checkout.wompi.co/l/VPOS_nJo3xk" class="btn" id="redirect-btn">Ir a Wompi ahora</a>

  <script>
    // Redirigir automáticamente después de 2 segundos
    setTimeout(function() {
      window.location.href = "https://checkout.wompi.co/l/VPOS_nJo3xk";
    }, 2000);
    
    // También permitir clic manual
    document.getElementById('redirect-btn').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = "https://checkout.wompi.co/l/VPOS_nJo3xk";
    });
  </script>
</body>
</html>
