<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Debug Wompi Checkout</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; }
    button { padding: 1rem 2rem; font-size: 1.1rem; cursor: pointer; }
    #logs { margin-top: 2rem; text-align: left; max-height: 200px; overflow: auto; border: 1px solid #ccc; padding: 1rem; }
    .error { color: red; }
    .success { color: green; }
  </style>
  <!-- 1) Cargamos el widget con handlers -->
  <script
    src="https://checkout.wompi.co/widget.js"
    onload="console.log('%c[Wompi] widget.js cargado correctamente','color:green')"
    onerror="console.error('%c[Wompi] ERROR cargando widget.js','color:red')">
  </script>
</head>
<body>
  <h1>Debug Widget Wompi</h1>
  <button id="btn-pagar">Pagar $10.000</button>

  <div id="logs"></div>

  <script>
    const logEl = document.getElementById('logs');
    function log(msg, type='info') {
      const p = document.createElement('p');
      p.textContent = msg;
      if (type==='error') p.classList.add('error');
      if (type==='success') p.classList.add('success');
      logEl.appendChild(p);
      console.log(msg);
    }

    document.addEventListener('DOMContentLoaded', () => {
      log('DOM listo');
      log('typeof WompiCheckout → ' + typeof window.WompiCheckout);
    });

    document.getElementById('btn-pagar').addEventListener('click', () => {
      log('Botón clickeado');
      log('typeof WompiCheckout en click → ' + typeof window.WompiCheckout);
      if (typeof window.WompiCheckout !== 'function') {
        log('¡WompiCheckout NO está definido!', 'error');
        return;
      }
      try {
        const checkout = new WompiCheckout({
          currency: 'COP',
          amountInCents: 10000 * 100,
          reference: 'debug_' + Date.now(),
          publicKey: 'pub_test_Q5kS4d6p3l1wE7tY0c5qBwG2jZ3xR1oP',
          redirectUrl: `${location.origin}/confirmation.html`
        });
        log('WompiCheckout instanciado correctamente', 'success');
        checkout.open();
      } catch (err) {
        log('Error al abrir checkout: ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
